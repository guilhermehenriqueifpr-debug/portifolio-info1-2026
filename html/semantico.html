<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <style>
        body{
            background-color: rgb(255, 255, 255);
            padding: 0px;
            display:flex;
            flex-direction:column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 1200px;
            background-color: rgb(255, 255, 255);
            border: 1px solid rgb(255, 255, 255);
        }
        header {
            border: 9px solid lightblue;
            padding:10px;
            margin: 5px;
            background-color: #3498db;
            background-clip:content-box;
            color:white;
            margin-bottom: 10px;

            
        }
        header h1 {
            font-size: 36px;
            margin-bottom: 20px;
        }
        nav {
            background-color: #e67e22;
            padding: 10px;
            border: 9px solid #18679b75;
            background-clip: content-box;
            margin: 8px;
        }
        nav ul {
            padding-left: 40px;
        }
        nav ul li a {
            color: #0000ee;
            text-decoration: underline;
            font-size: 14px;
            line-height: 1.5;
        }
        .main-content {
           background-color: #f0eeee; 
           padding: 10px; 
           margin-bottom: 10px;
           border: 9px solid #c7c6c6a9;
           margin: 5px;
           background-clip:content-box;
        }
        section {
            background-color: #f1c40f;
            padding: 10px;
            margin-bottom: 5px;
            font-family: sans-serif;
            border: 9px solid #c7c6c6a9;
            margin: 10px;
            background-clip:content-box;
        }
        section h2 {
            font-size: 20px;
            color: #000;
            margin-bottom: 15px;
        }
        article {
            background-color: #2ecc71;
            padding: 10px;
            color: #000;
            border: 1px solid #2ecc71;
            margin: 10px;
            background-clip:content-box;
            border-style: dotted;
            border-width: 2px;
            border-color: #2ecc71;
        }
        article h3 {
            font-size: 16px;
            margin-bottom: 10px;
        }
        article p {
            font-size: 14px;
        }
        aside {
            background-color: #9b59b6;
            color: white;
            padding: 10px;
            font-size: 14px;
            font-weight: bold;
            font-family: sans-serif;
            border: 10px solid #c7c6c6a9;
            margin: 10px;
            background-clip:content-box;
            min-height: 50px;
            display: flex; 
            flex-direction: column;
            justify-content: center;  
        }
        footer {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 14px;
            font-weight: bold;
            font-family: sans-serif;
            border: 10px solid #c7c6c6a9;
            margin: 5px;
            background-clip:content-box;
            min-height: 45px;
            display: flex;
            justify-content: center;
            align-items: center;  
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Título do Site (Header)</h1>
            <nav>
                <ul>
                    <li><a href="#">Início</a></li>
                    <li><a href="#">Sobre</a></li>
                </ul>
            </nav>
        </header>
        <div class="main-content">
            <section>
                <h2>Nossa Missão (Section)</h2>
                <article>
                    <h3>História da Empresa (Article)</h3>
                    <p>Conteúdo independente...</p>
                </article>
            </section>
            <aside>
                Links Relacionados (Aside)
            </aside>
        </div>
        <footer>
            © 2026 - Rodapé Semântico
        </footer>
    </div>
</body>
</html>
